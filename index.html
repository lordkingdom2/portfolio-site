<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspar Stanschus | Portfolio</title>
    <style>
        :root { --bg: #ffffff; --text: #000; --grid: rgba(0,0,0,0.05); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Helvetica Neue', Arial, sans-serif; cursor: grab; }
        
        /* Der unendliche Raum */
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #canvas {
            position: absolute; width: 10000px; height: 10000px;
            top: -5000px; left: -5000px;
            background-image: radial-gradient(var(--grid) 1px, transparent 1px);
            background-size: 50px 50px;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        /* Projekt-Cover-Karten */
        .project-card {
            position: absolute; width: 500px; /* Große, beeindruckende Covers */
            background: white; padding: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none; color: inherit;
        }

        .project-card:hover {
            transform: scale(1.02) translateY(-15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            z-index: 1000 !important;
        }
        
        .project-card img { width: 100%; height: auto; display: block; filter: grayscale(20%); transition: filter 0.5s; }
        .project-card:hover img { filter: grayscale(0%); }

        /* Infos erscheinen nur beim Hover */
        .project-info { margin-top: 15px; opacity: 0; transition: opacity 0.4s ease; }
        .project-card:hover .project-info { opacity: 1; }

        .project-title { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.5px; }
        .project-meta { font-size: 13px; color: #777; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        /* Minimalistisches UI */
        header { position: fixed; top: 40px; left: 40px; z-index: 2000; pointer-events: none; }
        h1 { margin: 0; font-size: 16px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1>KASPAR STANSCHUS</h1>
</header>

<div id="viewport">
    <div id="canvas">
        <div id="project-container"></div>
    </div>
</div>

<script>
    // DEIN GOOGLE SHEETS LINK HIER
    const csvUrl = "https://docs.google.com/spreadsheets/d/1pzU_3ax_nj7qFz7iQvapRlKYDlsWoeCiZzXsqNIOIHs/export?format=csv";

    async function loadPortfolio() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            rows.forEach((row, i) => {
                const [title, location, year, image, url, x, y] = row.split(',');
                if(title) {
                    const card = document.createElement('a');
                    card.className = 'project-card';
                    card.href = url;
                    card.style.left = x + 'px';
                    card.style.top = y + 'px';
                    card.style.zIndex = i;
                    card.innerHTML = `
                        <img src="${image}" alt="${title}">
                        <div class="project-info">
                            <p class="project-title">${title}</p>
                            <p class="project-meta">${location} • ${year}</p>
                        </div>
                    `;
                    document.getElementById('project-container').appendChild(card);
                }
            });
        } catch (e) { console.error("Daten konnten nicht geladen werden", e); }
    }
    loadPortfolio();

    // Smooth Drag & Pan Logik
    let isDragging = false, pos = { x: -4500, y: -4500 }, start = { x: 0, y: 0 };
    const canvas = document.getElementById('canvas');

    window.addEventListener('mousedown', e => { 
        isDragging = true; 
        start = { x: e.clientX - pos.x, y: e.clientY - pos.y };
        document.body.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => { 
        if(!isDragging) return;
        pos.x = e.clientX - start.x;
        pos.y = e.clientY - start.y;
        canvas.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
    });
    window.addEventListener('mouseup', () => { 
        isDragging = false; 
        document.body.style.cursor = 'grab';
    });
</script>
</body>
</html>
