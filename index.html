<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspar Stanschus | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #000; 
            --grid: rgba(0,0,0,0.04);
            --size-title: 35px;   /* 26pt */
            --size-caption: 11px; /* 8pt */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Inter Tight', sans-serif; 
            color: var(--text);
            cursor: grab;
        }
        
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        #canvas {
            position: absolute; width: 10000px; height: 10000px;
            top: 0; left: 0;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 100px 100px;
            will-change: transform;
        }

        .project-card {
            position: absolute; width: 500px; 
            background: white; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            text-decoration: none; color: inherit;
            display: flex; flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }

        .project-card:hover {
            transform: scale(1.01) translateY(-10px) !important;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            z-index: 1000 !important;
        }
        
        /* Bild-Container verhindert das Springen */
        .image-wrapper {
            width: 100%;
            aspect-ratio: 4 / 3; /* Reserviert den Platz im 4:3 Format (typisch für Modellfotos) */
            background: #f5f5f5; /* Heller Platzhalter-Kasten */
            margin-bottom: 25px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .project-card img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Bild füllt den Kasten sauber aus */
            display: block;
            transition: opacity 0.5s ease;
        }

        .project-title { font-size: var(--size-title); font-weight: 700; line-height: 1.1; margin: 0; letter-spacing: -0.02em; }
        .project-caption { font-size: var(--size-caption); font-weight: 300; color: #888; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; }

        header { position: fixed; top: 40px; left: 40px; z-index: 2000; pointer-events: none; }
        header h1 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; opacity: 0.5; }
        
        #loading { position: fixed; inset: 0; background: white; z-index: 3000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="loading">KASPAR STANSCHUS — PORTFOLIO</div>

<header>
    <h1>KASPAR STANSCHUS</h1>
</header>

<div id="viewport">
    <div id="canvas">
        <div id="project-container"></div>
    </div>
</div>

<script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/1pzU_3ax_nj7qFz7iQvapRlKYDlsWoeCiZzXsqNIOIHs/export?format=csv";
    window.pz = null; 

    async function loadPortfolio() {
        const loadingScreen = document.getElementById('loading');
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            
            let firstX = 5000, firstY = 5000;

            rows.forEach((row, i) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if(cols.length >= 7) {
                    const title = cols[0].replace(/"/g, "").trim();
                    const location = cols[1].replace(/"/g, "").trim();
                    const year = cols[2].replace(/"/g, "").trim();
                    const image = cols[3].replace(/"/g, "").trim();
                    const url = cols[5].replace(/"/g, "").trim();
                    const x = parseFloat(cols[6]) || 5000;
                    const y = parseFloat(cols[7]) || 5000;

                    if (i === 0) { firstX = x; firstY = y; }

                    const card = document.createElement('a');
                    card.className = 'project-card';
                    card.href = (url && url !== "#") ? url : "javascript:void(0)";
                    card.style.left = x + 'px';
                    card.style.top = y + 'px';
                    card.style.animationDelay = (i * 0.1) + 's';

                    // Der image-wrapper hält den Platz frei, auch wenn das Bild noch fehlt
                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${image}" alt="${title}" onerror="this.style.opacity='0'">
                        </div>
                        <div class="project-caption">${location} — ${year}</div>
                        <h2 class="project-title">${title}</h2>
                    `;
                    document.getElementById('project-container').appendChild(card);
                }
            });
            
            const canvasElement = document.getElementById('canvas');
            window.pz = panzoom(canvasElement, {
                maxZoom: 2, minZoom: 0.15, initialZoom: 0.8, bounds: true, boundsPadding: 0.1
            });

            setTimeout(() => {
                const centerX = (window.innerWidth / 2) - firstX - 250;
                const centerY = (window.innerHeight / 2) - firstY - 200;
                window.pz.moveTo(centerX, centerY);
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.remove(), 600);
            }, 200);

        } catch (e) { 
            console.error("Datenfehler:", e);
            loadingScreen.innerHTML = "FEHLER BEIM LADEN";
        }
    }

    loadPortfolio();
</script>
</body>
</html>
