<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspar Stanschus | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; --text: #000; --grid: rgba(0,0,0,0.04);
            --size-title: 35px; --size-caption: 11px; --size-body: 16px;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Inter Tight', sans-serif; color: var(--text); cursor: grab;
            user-select: none; -webkit-user-select: none;
        }
        
        body:active { cursor: grabbing; }
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        #canvas {
            position: absolute; width: 10000px; height: 10000px; top: 0; left: 0;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 100px 100px; will-change: transform;
        }

        .project-card {
            position: absolute; width: 500px; background: white; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            cursor: pointer;
        }

        .project-card:hover { transform: scale(1.01) translateY(-10px) !important; box-shadow: 0 40px 80px rgba(0,0,0,0.08); z-index: 1000 !important; }
        .image-wrapper { width: 100%; aspect-ratio: 4 / 3; background: #fcfcfc; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .project-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .project-caption { font-size: var(--size-caption); font-weight: 300; color: #888; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; }
        .project-title { font-size: var(--size-title); font-weight: 700; line-height: 1.05; margin: 0; letter-spacing: -0.02em; }

        /* UI */
        header { position: fixed; top: 40px; left: 40px; z-index: 2000; pointer-events: none; }
        header h1 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; opacity: 0.4; }

        #lang-switch { position: fixed; top: 40px; right: 40px; z-index: 2000; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        .lang-btn { cursor: pointer; opacity: 0.3; transition: opacity 0.3s; padding: 5px; }
        .lang-btn.active { opacity: 1; }

        /* DETAIL OVERLAY */
        #detail-overlay {
            position: fixed; inset: 0; background: white; z-index: 4000;
            display: none; padding: 120px 40px; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #detail-overlay.open { display: block; transform: translateY(0); }
        .detail-content { max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        .detail-close { position: fixed; top: 40px; right: 40px; cursor: pointer; font-size: 10px; font-weight: 700; letter-spacing: 2px; z-index: 4001; }
        .detail-image { width: 100%; height: auto; margin: 40px 0; }
        .detail-body { font-size: var(--size-body); line-height: 1.8; color: #222; font-weight: 400; }

        #loading { position: fixed; inset: 0; background: white; z-index: 3000; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="loading">PORTFOLIO LOADING...</div>

<div id="lang-switch">
    <span id="btn-de" class="lang-btn" onclick="toggleLang('de')">DE</span> / 
    <span id="btn-en" class="lang-btn" onclick="toggleLang('en')">EN</span>
</div>

<header><h1>KASPAR STANSCHUS</h1></header>

<div id="viewport"><div id="canvas"><div id="project-container"></div></div></div>

<div id="detail-overlay">
    <div class="detail-close" onclick="closeDetail()">CLOSE — ESC</div>
    <div class="detail-content" id="detail-content"></div>
</div>

<script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ8uBR23TLDRRzCLLwvpSIHu8c90HpAAU28Os6NZyHNn2f7Lb3cP451oJIf2byz2Fh4405XgUF7cSd/pub?gid=0&single=true&output=csv";
    
    let currentLang = navigator.language.startsWith('de') ? 'de' : 'en';
    let cachedData = [];
    window.pz = null; // Nur einmal deklariert!

    async function loadData() {
        const loadingScreen = document.getElementById('loading');
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);
            cachedData = rows.map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            renderPortfolio();
        } catch(e) { 
            console.error(e); 
            loadingScreen.innerHTML = "FEHLER BEIM LADEN - BITTE SHEET PRÜFEN";
        }
    }

    function renderPortfolio() {
        const container = document.getElementById('project-container');
        container.innerHTML = ''; 
        let firstX = 5000, firstY = 5000;

        cachedData.forEach((cols, i) => {
            if(cols.length >= 10) {
                const title = currentLang === 'de' ? cols[0] : cols[1];
                const location = currentLang === 'de' ? cols[2] : cols[3];
                const year = cols[6];
                const image = cols[7].replace(/"/g, "").trim();
                const x = parseFloat(cols[9]) || 5000;
                const y = parseFloat(cols[10]) || 5000;

                if (i === 0) { firstX = x; firstY = y; }

                const card = document.createElement('div');
                card.className = 'project-card';
                card.style.left = x + 'px'; card.style.top = y + 'px';
                card.onclick = () => { if (!window.pz.isMoving()) openDetail(i); };

                card.innerHTML = `
                    <div class="image-wrapper"><img src="${image}" draggable="false"></div>
                    <div class="project-caption">${location.replace(/"/g, "")} — ${year}</div>
                    <h2 class="project-title">${title.replace(/"/g, "")}</h2>
                `;
                container.appendChild(card);
            }
        });

        if (!window.pz) initPanzoom(firstX, firstY);
        updateLangUI();
    }

    function openDetail(index) {
        const data = cachedData[index];
        const title = currentLang === 'de' ? data[0] : data[1];
        const location = currentLang === 'de' ? data[2] : data[3];
        const body = currentLang === 'de' ? data[4] : data[5];
        const image = data[7].replace(/"/g, "");

        document.getElementById('detail-content').innerHTML = `
            <div class="project-caption" style="margin-bottom: 10px;">${location.replace(/"/g, "")}</div>
            <h1 class="project-title" style="font-size: clamp(40px, 8vw, 80px); margin-bottom: 40px;">${title.replace(/"/g, "")}</h1>
            <img class="detail-image" src="${image}">
            <div class="detail-body">${body.replace(/"/g, "")}</div>
        `;
        
        const overlay = document.getElementById('detail-overlay');
        overlay.style.display = 'block';
        setTimeout(() => overlay.classList.add('open'), 50);
    }

    function closeDetail() {
        const overlay = document.getElementById('detail-overlay');
        overlay.classList.remove('open');
        setTimeout(() => overlay.style.display = 'none', 700);
    }

    function initPanzoom(x, y) {
        window.pz = panzoom(document.getElementById('canvas'), {
            maxZoom: 2, minZoom: 0.15, initialZoom: 0.8, bounds: true, boundsPadding: 0.1
        });
        setTimeout(() => {
            const z = window.pz.getTransform().scale;
            window.pz.moveTo((window.innerWidth/2)-((x+250)*z), (window.innerHeight/2)-((y+200)*z));
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => { if(document.getElementById('loading')) document.getElementById('loading').remove(); }, 600);
        }, 300);
    }

    function toggleLang(l) { currentLang = l; renderPortfolio(); }
    function updateLangUI() {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+currentLang));
    }

    loadData();
    window.addEventListener('keydown', (e) => { if(e.key === "Escape") closeDetail(); });
</script>
</body>
</html>
